name: Refresh Odds

# Roda diariamente para puxar as odds pre-match (Betano · Match Winner)
# de cada partida da fase de grupos via API-Football e gravar em match_odds.
#
# Pré-requisitos (Settings → Secrets and variables → Actions):
#   Secrets:
#     - API_FOOTBALL_KEY
#     - SUPABASE_SERVICE_ROLE_KEY
#   Variables:
#     - SUPABASE_URL

on:
  schedule:
    # A cada 2h (no minuto :30): odds pré-jogo (1 chamada por jogo futuro) não
    # oscilam rápido o bastante pra valer menos que isso.
    - cron: '30 */2 * * *'
  workflow_dispatch:        # botão "Run workflow" no GitHub UI

concurrency:
  group: refresh-odds
  cancel-in-progress: false

jobs:
  refresh:
    name: Fetch odds & upsert
    runs-on: ubuntu-latest
    # Só roda se houver credenciais (evita falhar em forks)
    if: ${{ vars.SUPABASE_URL != '' }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS — @supabase/supabase-js exige WebSocket nativo (não disponível em Node 20)
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fetch-odds (fase de grupos)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/data/fetch-odds.js

      # Mata-mata: só os confrontos JÁ definidos (times reais) têm fixture na API.
      # Ligação ao vivo por par de seleções; reorienta o mando p/ o nosso team_home.
      - name: Run fetch-odds (mata-mata)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/data/fetch-odds.js --ko
