name: Refresh Predictions

# Roda diariamente: puxa a previsão pré-jogo (1X2 + comparação/radar) de cada
# partida da fase de grupos via API-Football e grava NORMALIZADO em
# match_predictions. Só grava quando há previsão ÚTIL — sem dado, sem linha
# (e o front não mostra nada), igual ao refresh-odds.
#
# Pré-requisitos (Settings → Secrets and variables → Actions):
#   Secrets:
#     - API_FOOTBALL_KEY
#     - SUPABASE_SERVICE_ROLE_KEY
#   Variables:
#     - SUPABASE_URL

on:
  schedule:
    # 2×/dia (06:00 e 18:00 UTC): previsão pré-jogo é quase estática.
    - cron: '0 6,18 * * *'
  workflow_dispatch:        # botão "Run workflow" no GitHub UI

concurrency:
  group: refresh-predictions
  cancel-in-progress: false

jobs:
  refresh:
    name: Fetch predictions & upsert
    runs-on: ubuntu-latest
    # Só roda se houver credenciais (evita falhar em forks)
    if: ${{ vars.SUPABASE_URL != '' }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 LTS — @supabase/supabase-js exige WebSocket nativo (não disponível em Node 20)
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fetch-predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/data/fetch-predictions.js
