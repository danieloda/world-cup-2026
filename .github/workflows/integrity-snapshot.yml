name: Integrity Snapshot

# Carimba (snapshot + hash encadeado) os palpites já travados, diariamente.
# Defensibilidade do bolão (achado H3): prova de imutabilidade pós-trava sem
# confiar no operador do banco. O commit de volta = timestamp do histórico do
# GitHub; o Telegram = timestamp de terceiro.
#
# Pré-requisitos (Settings → Secrets and variables → Actions):
#   Variables:  SUPABASE_URL
#   Secrets:    SUPABASE_SERVICE_ROLE_KEY
#               TELEGRAM_TOKEN, TELEGRAM_CHAT_ID   (opcionais — posta o hash)

on:
  schedule:
    # 03:09 UTC = 00:09 BRT — 10 min depois da trava do dia (deadlines são
    # véspera 23h59 BRT), minimizando a janela trava→carimbo.
    - cron: '9 3 * * *'
  workflow_dispatch:

concurrency:
  group: integrity-snapshot
  cancel-in-progress: false

permissions:
  contents: write          # commitar o snapshot + manifest de volta

jobs:
  snapshot:
    name: Snapshot & chain
    runs-on: ubuntu-latest
    if: ${{ vars.SUPABASE_URL != '' }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate snapshot
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/integrity/snapshot.js

      - name: Verify chain (sanity)
        run: node scripts/integrity/verify.js

      - name: Commit snapshot if changed
        run: |
          if [ -z "$(git status --porcelain integrity/)" ]; then
            echo "Sem mudança no snapshot — nada a commitar."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add integrity/
          git commit -m "chore(integrity): snapshot automático dos palpites travados [skip ci]"
          git push

      # Confirma que o report deste lacre EXISTE no GitHub (raw + chain_hash)
      # e registra a publicação no banco — é o que revela os palpites no app
      # antes do apito (migration 060). Falhou → app segue no fallback do
      # apito e este passo fica vermelho.
      - name: Confirma publicação e libera revelação no app
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/integrity/confirm-publication.js

      # Palpites recém-lacrados no grupo — SÓ depois do verify + commit/push +
      # confirmação acima: se qualquer passo anterior falhar, o grupo não
      # recebe link de relatório que não foi publicado. Sem jogo novo no
      # lacre → no-op.
      - name: Posta palpites recém-lacrados (depois do publish)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/integrity/post-picks.js
