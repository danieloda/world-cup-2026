<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Super Bolão Copa · Bola de Fogo (realista)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0e13;--panel:#13161d;--panel-2:#171b24;--line:rgba(255,255,255,.08);
    --gold:#f4c430;--mute:#8a8f9a;--paper:#f4f1e8;--fire:#ff6a18}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#e9eaed;font-family:'Oswald',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(900px 520px at 88% -12%, rgba(255,106,24,.13), transparent 60%),radial-gradient(760px 520px at -5% 112%, rgba(244,196,48,.06), transparent 55%)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px 100px}
  header.hero{padding:66px 0 24px;text-align:center}
  .kicker{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:var(--fire);margin:0 0 18px}
  .hero h1{font-family:'Anton';font-weight:400;margin:0;line-height:.92;font-size:clamp(40px,8vw,90px);text-transform:uppercase}
  .hero h1 .b{background:linear-gradient(180deg,#ffd54a,#ff6a18);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .sub{max-width:600px;margin:20px auto 0;color:var(--mute);font-size:16px;line-height:1.6}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line) 20%,var(--line) 80%,transparent);margin:30px 0 44px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:26px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{position:relative;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .card .num{position:absolute;top:16px;right:20px;font-family:'Space Mono',monospace;font-size:12px;color:var(--mute);z-index:3}
  .stage{position:relative;height:280px;display:grid;place-items:center;background:radial-gradient(120% 120% at 50% 0%, #181c25, #0c0e13);border-bottom:1px solid var(--line)}
  .stage svg{position:relative;z-index:1;max-height:230px;width:auto}
  .meta{padding:20px 22px 18px;display:flex;gap:18px;align-items:flex-start;justify-content:space-between}
  .meta h3{margin:0;font-family:'Bebas Neue';font-weight:400;font-size:25px;letter-spacing:.04em}
  .meta p{margin:4px 0 0;color:var(--mute);font-size:13.5px;line-height:1.45;max-width:42ch}
  .tag{flex:none;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fire);background:rgba(255,106,24,.12);border:1px solid rgba(255,106,24,.28);padding:5px 9px;border-radius:7px}
  .variants{display:flex;gap:12px;padding:0 22px 22px}
  .chip{border:1px solid var(--line);border-radius:12px;display:grid;place-items:center;height:90px;overflow:hidden}
  .chip.light{flex:1;background:var(--paper)}.chip.light svg{max-height:64px}
  .chip.fav{flex:none;width:90px;background:#0e1015}.chip.fav svg{max-height:70px}
  footer{margin-top:56px;text-align:center;color:var(--mute);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em}
  footer b{color:var(--fire)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <p class="kicker">Identidade · Bola de Fogo — realista</p>
    <h1>Super <span class="b">Bolão</span> Copa</h1>
    <p class="sub">Esfera com sombreamento 3D e brilho; chama com turbulência e desfoque — fogo vivo, animado. Tudo vetor: escala e recolore.</p>
  </header>
  <div class="rule"></div>
  <div class="grid" id="grid"></div>
  <footer>SVG realista · pra <b>fotorrealismo</b> raster use Recraft/Ideogram e me manda o PNG · diga o nº pra eu aplicar</footer>
</div>

<script>
const R1=n=>Math.round(n*10)/10; let S=0;
function poly(cx,cy,rad,rot,n=5){let p='';for(let i=0;i<n;i++){const a=(rot-90+i*360/n)*Math.PI/180;p+=(i?'L':'M')+R1(cx+rad*Math.cos(a))+','+R1(cy+rad*Math.sin(a));}return p+'Z';}

/* ---------- realistic 3D soccer ball ---------- */
function realBall(R){
  const id='b'+(S++), dark='#191920';
  let panels=`<path d="${poly(0,0,R*.34,0,5)}" fill="${dark}"/>`;
  for(let k=0;k<5;k++){
    const ang=-90+72*k, a=ang*Math.PI/180;
    const px=R*.66*Math.cos(a), py=R*.66*Math.sin(a);
    panels+=`<path d="${poly(px,py,R*.205,ang+180,5)}" fill="${dark}"/>`;
    // seam from centre pentagon vertex outward
    panels+=`<line x1="${R1(R*.34*Math.cos(a))}" y1="${R1(R*.34*Math.sin(a))}" x2="${R1(R*.5*Math.cos(a))}" y2="${R1(R*.5*Math.sin(a))}" stroke="#cfc9ba" stroke-width="${R1(R*.022)}"/>`;
  }
  return `
  <defs>
    <radialGradient id="${id}body" cx="37%" cy="32%" r="72%">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".5" stop-color="#f1eee4"/>
      <stop offset=".82" stop-color="#d6d0c2"/><stop offset="1" stop-color="#b7b1a2"/>
    </radialGradient>
    <radialGradient id="${id}vig" cx="40%" cy="36%" r="68%">
      <stop offset="0" stop-color="rgba(0,0,0,0)"/><stop offset=".62" stop-color="rgba(0,0,0,0)"/>
      <stop offset=".9" stop-color="rgba(20,16,8,.34)"/><stop offset="1" stop-color="rgba(20,14,6,.6)"/>
    </radialGradient>
    <radialGradient id="${id}warm" cx="62%" cy="78%" r="60%">
      <stop offset="0" stop-color="rgba(255,120,30,.55)"/><stop offset="1" stop-color="rgba(255,120,30,0)"/>
    </radialGradient>
    <clipPath id="${id}clip"><circle r="${R}"/></clipPath>
    <filter id="${id}soft"><feGaussianBlur stdDeviation="${R1(R*.012)}"/></filter>
  </defs>
  <circle r="${R}" fill="url(#${id}body)"/>
  <g clip-path="url(#${id}clip)" filter="url(#${id}soft)">${panels}</g>
  <circle r="${R}" fill="url(#${id}warm)" clip-path="url(#${id}clip)"/>
  <circle r="${R}" fill="url(#${id}vig)"/>
  <ellipse cx="${R1(-R*.3)}" cy="${R1(-R*.36)}" rx="${R1(R*.34)}" ry="${R1(R*.2)}" fill="rgba(255,255,255,.55)" filter="url(#${id}soft)"/>
  <circle r="${R}" fill="none" stroke="rgba(0,0,0,.22)" stroke-width="${R1(R*.03)}"/>`;
}

/* ---------- realistic fire (turbulence + blur) ---------- */
function tongue(bx,by,aDeg,len,wid){
  const a=aDeg*Math.PI/180,dx=Math.cos(a),dy=Math.sin(a),px=-dy,py=dx,hw=wid/2,m=.56,bg=1.3;
  const b1x=bx+px*hw,b1y=by+py*hw,b2x=bx-px*hw,b2y=by-py*hw,tx=bx+dx*len,ty=by+dy*len;
  return `M${R1(b1x)},${R1(b1y)} Q${R1(bx+dx*len*m+px*hw*bg)},${R1(by+dy*len*m+py*hw*bg)} ${R1(tx)},${R1(ty)} Q${R1(bx+dx*len*m-px*hw*bg)},${R1(by+dy*len*m-py*hw*bg)} ${R1(b2x)},${R1(b2y)}Z`;
}
function plume(R,base,sl,sw){
  const specs=[{o:0,s:0,l:2.7,w:1.05},{o:-16,s:-.44,l:2.0,w:.62},{o:16,s:.44,l:2.0,w:.62},{o:-7,s:-.19,l:1.5,w:.48},{o:9,s:.2,l:1.6,w:.48}];
  const bA=base*Math.PI/180,bx=Math.cos(bA),by=Math.sin(bA),px=-by,py=bx;
  return specs.map(t=>tongue((bx*.12+px*t.s)*R,(by*.12+py*t.s)*R, base+t.o, t.l*R*sl, t.w*R*sw)).join(' ');
}
const PAL={
  laranja:{o:['#ff8a18','#ff6000','rgba(190,70,0,0)'], m:['#ffb84d','#ff7e1a','rgba(255,90,0,0)'], i:['#ffe7b0','#ffc24a','rgba(255,150,0,0)'], glow:'#ff6a00', ring:['#ffa23a','#ec6206']},
  dourado:{o:['#e6a81c','#c98c10','rgba(170,115,8,0)'], m:['#ffd76a','#f4c430','rgba(230,168,20,0)'], i:['#fff6d8','#ffe487','rgba(255,210,90,0)'], glow:'#efb01e', ring:['#ffd76a','#d99e14']},
  fiery:{o:['#ff5a00','#e22000','rgba(150,8,0,0)'], m:['#ffc23a','#ff6a00','rgba(255,60,0,0)'], i:['#fff7cf','#ffd23a','rgba(255,150,0,0)'], glow:'#ff4500', ring:['#ffa23a','#ec6206']},
};
function fire(R,base,pal){
  const id='f'+(S++);
  const bA=base*Math.PI/180,bx=Math.cos(bA),by=Math.sin(bA);
  const grad=(g,c)=>`<linearGradient id="${g}" gradientUnits="userSpaceOnUse" x1="${R1(bx*.15*R)}" y1="${R1(by*.15*R)}" x2="${R1(bx*2.7*R)}" y2="${R1(by*2.7*R)}"><stop offset="0" stop-color="${c[0]}"/><stop offset=".5" stop-color="${c[1]}"/><stop offset="1" stop-color="${c[2]}"/></linearGradient>`;
  return {
    defs:`<defs>
      <filter id="${id}fl" x="-80%" y="-80%" width="260%" height="260%">
        <feTurbulence type="fractalNoise" baseFrequency="0.016 0.028" numOctaves="3" seed="${(S*7)%97}" result="n">
          <animate attributeName="baseFrequency" dur="2.8s" values="0.016 0.028;0.024 0.04;0.016 0.028" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="${R1(R*.55)}" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="${R1(R*.028)}"/>
      </filter>
      <filter id="${id}gl" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="${R1(R*.3)}"/></filter>
      ${grad(id+'o',pal.o)}${grad(id+'m',pal.m)}${grad(id+'i',pal.i)}
    </defs>`,
    back:`<g filter="url(#${id}gl)"><path d="${plume(R,base,1.05,1.25)}" fill="${pal.glow}" opacity=".5"/></g>
      <g filter="url(#${id}fl)">
        <path d="${plume(R,base,1.05,1.2)}" fill="url(#${id}o)"/>
        <path d="${plume(R,base,.85,.82)}" fill="url(#${id}m)"/>
        <path d="${plume(R,base,.6,.52)}" fill="url(#${id}i)"/>
      </g>`,
    front:`<g filter="url(#${id}fl)" opacity=".95">
        <path d="${plume(R,base,.7,.62)}" fill="url(#${id}m)"/>
        <path d="${plume(R,base,.48,.4)}" fill="url(#${id}i)"/>
      </g>`
  };
}
function ring(R,pal){
  const id='rg'+(S++);
  return `<defs><linearGradient id="${id}" x1="0" y1="${R1(-R*1.25)}" x2="0" y2="${R1(R*1.25)}" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="${pal.ring[0]}"/><stop offset="1" stop-color="${pal.ring[1]}"/></linearGradient></defs>
  <circle r="${R1(R*1.13)}" fill="none" stroke="rgba(0,0,0,.2)" stroke-width="${R1(R*.245)}"/>
  <circle r="${R1(R*1.13)}" fill="none" stroke="url(#${id})" stroke-width="${R1(R*.2)}"/>`;
}

const svg=(vb,inner)=>`<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;

/* ---------- compositions (bola + anel + chamas no topo) ---------- */
function hero(R, palKey, base=-70){
  const pal=PAL[palKey], f=fire(R,base,pal);
  const W=R*4.3, H=R*5.7, cx=W/2, cy=H-R*1.7, up=R*.72;
  return svg(`0 0 ${R1(W)} ${R1(H)}`, f.defs+
    `<g transform="translate(${R1(cx)},${R1(cy)})">
       <g transform="translate(0,${R1(-up)})">${f.back}</g>
       ${ring(R,pal)}${realBall(R)}
       <g transform="translate(0,${R1(-up)})">${f.front}</g>
     </g>`);
}
function appicon(R=30, palKey='laranja'){
  const pal=PAL[palKey], f=fire(R,-72,pal), up=R*.72, cid='ai'+(S++);
  return svg('0 0 160 160',
    `<clipPath id="${cid}"><rect x="3" y="3" width="154" height="154" rx="36"/></clipPath>
     <rect x="3" y="3" width="154" height="154" rx="36" fill="#11141b" stroke="rgba(255,106,24,.5)" stroke-width="1.5"/>`+
    f.defs+
    `<g clip-path="url(#${cid})"><g transform="translate(80,100)">
       <g transform="translate(0,${R1(-up)})">${f.back}</g>${ring(R,pal)}${realBall(R)}
       <g transform="translate(0,${R1(-up)})">${f.front}</g>
     </g></g>`);
}
function lockup(R=28, palKey='laranja'){
  const pal=PAL[palKey], f=fire(R,-84,pal), up=R*.72;
  return svg('0 0 420 150', f.defs+
    `<g transform="translate(78,108)">
       <g transform="translate(0,${R1(-up)})">${f.back}</g>${ring(R,pal)}${realBall(R)}
       <g transform="translate(0,${R1(-up)})">${f.front}</g>
     </g>
     <text x="150" y="92" font-family="Anton" font-size="54" fill="#fff">SBC</text>
     <text x="152" y="116" font-family="Oswald" font-weight="600" font-size="13" letter-spacing="5" fill="#f4c430">SUPER BOLÃO COPA</text>`);
}

const DATA=[
  {n:'Laranja — referência', tag:'Ícone', d:'Bola com anel laranja e chamas saindo do topo, igual sua referência — mas com fogo animado e brilho.', main:()=>hero(52,'laranja'), fav:()=>appicon(28,'laranja')},
  {n:'Dourado — marca', tag:'Ícone', d:'Mesma composição na cor da casa (o dourado SBC). Combina com o resto do site.', main:()=>hero(52,'dourado'), fav:()=>appicon(28,'dourado')},
  {n:'Ícone de App', tag:'App / Favicon', d:'No quadrado arredondado, pronto pra ícone de app e favicon.', main:()=>appicon(34,'laranja'), fav:()=>appicon(28,'dourado')},
  {n:'Lockup', tag:'Header', d:'Bola em chamas + nome. Pra barra superior, login e cabeçalhos.', main:()=>lockup(30,'laranja'), fav:()=>appicon(28,'laranja')},
];
document.getElementById('grid').innerHTML=DATA.map((c,i)=>`
  <article class="card"><span class="num">0${i+1}</span>
    <div class="stage">${c.main()}</div>
    <div class="meta"><div><h3>${c.n}</h3><p>${c.d}</p></div><span class="tag">${c.tag}</span></div>
    <div class="variants"><div class="chip light">${c.main()}</div><div class="chip fav">${c.fav()}</div></div>
  </article>`).join('');
</script>
</body>
</html>
