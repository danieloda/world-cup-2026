<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar senha · SBC 2026</title>
  <meta name="description" content="Recupere o acesso à sua conta SBC 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Favicons & PWA — Super Bolão Copa -->
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/assets/icons/site.webmanifest">
  <meta name="theme-color" content="#000000">
  <!-- Open Graph / social share -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Super Bolão Copa">
  <meta property="og:title" content="SBC 2026 — Super Bolão Copa">
  <meta property="og:description" content="O bolão da Copa do Mundo FIFA 2026 entre amigos: palpites, ranking e disputa em tempo real.">
  <meta property="og:image" content="https://superbolaocopa.netlify.app/assets/icons/logo-social.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="https://superbolaocopa.netlify.app/assets/icons/logo-social.png">
  <link href="css/app.css" rel="stylesheet">
</head>
<body>

<main class="login-page">
  <form id="forgotForm" class="login-card" autocomplete="on">
    <div class="login-brand">
      <div class="login-brand-logo">
        <img src="assets/icons/logo-social.png" alt="SBC 2026" width="78" height="78">
      </div>
      <h1>Recuperar senha</h1>
      <p>Enviaremos um link pra você criar uma nova</p>
    </div>

    <div class="login-field">
      <label for="email">Email da conta</label>
      <div class="login-input">
        <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        <input id="email" name="email" type="email" required autocomplete="email" autofocus placeholder="voce@email.com">
      </div>
    </div>

    <div id="errorBox" class="login-error" hidden></div>
    <div id="successBox" class="login-success" hidden></div>

    <button type="submit" id="submitBtn" class="btn btn-green">Enviar link</button>

    <div class="login-foot">
      Lembrou? <a href="login.html">Voltar pro login</a>
    </div>
  </form>
</main>

<script type="module" src="js/pages/forgot-password.js"></script>
</body>
</html>
