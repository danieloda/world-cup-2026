<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Complete seu perfil · SBC 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Favicons & PWA — Super Bolão Copa -->
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/assets/icons/site.webmanifest">
  <meta name="theme-color" content="#000000">
  <!-- Open Graph / social share -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Super Bolão Copa">
  <meta property="og:title" content="SBC 2026 — Super Bolão Copa">
  <meta property="og:description" content="O bolão da Copa do Mundo FIFA 2026 entre amigos: palpites, ranking e disputa em tempo real.">
  <meta property="og:image" content="https://superbolaocopa.netlify.app/assets/icons/logo-social.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="https://superbolaocopa.netlify.app/assets/icons/logo-social.png">
  <link href="css/app.css" rel="stylesheet">
</head>
<body>

<main class="login-page">
  <form id="profileForm" class="login-card" autocomplete="off">
    <div class="login-brand">
      <div class="login-brand-logo">
        <img src="assets/icons/logo-social.png" alt="SBC 2026" width="78" height="78">
      </div>
      <h1>Quase lá!</h1>
      <p>Escolha uma foto de avatar pra continuar</p>
    </div>

    <div class="avatar-upload">
      <div class="avatar-preview" id="avatarPreview">
        <span id="previewInitials"></span>
        <img id="previewImg" hidden alt="preview">
      </div>
      <label for="avatarFile" id="avatarLabel" class="btn btn-dark btn-sm" tabindex="0" role="button" style="cursor:pointer;">
        Escolher imagem
      </label>
      <input id="avatarFile" type="file" accept="image/png,image/jpeg,image/webp" hidden>
      <p class="avatar-hint">PNG, JPG ou WEBP · máx 2MB</p>
    </div>

    <div id="errorBox" class="login-error" hidden></div>

    <button type="submit" id="submitBtn" class="btn btn-green" disabled>Salvar e entrar</button>

    <div class="login-foot">
      <a href="#" id="logoutLink" style="color:var(--text-mute);">Sair</a>
    </div>
  </form>
</main>

<script type="module" src="js/pages/complete-profile.js"></script>
</body>
</html>
