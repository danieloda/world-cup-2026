# Netlify configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command - generates config.js from environment variables
  command = "npm run build:config"

  # Directory to deploy (root since this is a static site)
  publish = "."

# Environment variables needed (set these in Netlify UI):
# - SUPABASE_URL
# - SUPABASE_PUBLISHABLE_KEY

# Redirects for SPA-like behavior (optional, if needed)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
